<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#FFE4ED" />
    <meta
      name="description"
      content="Modas Candela: una historia de moda, familia y color."
    />
    <link rel="icon" type="image/png" sizes="150x150" href="/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Molle:ital@1&display=swap"
      rel="stylesheet"
    />
    <title>Estudio Candela</title>
  </head>
  <body>
    <main>
      <header id="hero" class="hero" aria-labelledby="hero-title">
        <img
          class="hero__logo"
          src="/candela-logo.png"
          alt="Logo de Modas Candela"
          width="1536"
          height="1024"
          fetchpriority="high"
        />
        <div class="hero__content">
          <div class="hero__wordmark">
            <p class="hero__brand-prefix">Modas</p>
            <h1 id="hero-title" class="hero__title">Candela</h1>
          </div>
        </div>
        <img
          class="hero__mannequin"
          src="/maniqui1.png"
          alt="Maniquí con vestido de satén"
          width="804"
          height="1944"
          fetchpriority="high"
        />
      </header>

      <section
        id="section-1"
        class="page-section page-section--green story"
        aria-labelledby="story-title"
      >
        <div class="section-shell story__content">
          <div class="section-heading">
            <i class="ph-fill ph-heart section-heading__heart" aria-hidden="true"></i>
            <h2 id="story-title" class="section-heading__title">¿Cómo nacimos?</h2>
          </div>
          <div class="story__body">
            <p class="story__copy">
              Con el sueño de una niña de 10 años construimos nuestros almacenes y la gran familia.
            </p>
            <img
              class="story__mascot"
              src="/candela-leaf-mascot.png"
              alt="Personaje vegetal de Modas Candela"
              width="700"
              height="700"
              loading="lazy"
            />
          </div>
        </div>
      </section>

      <section
        id="section-2"
        class="page-section page-section--purple products"
        aria-labelledby="products-title"
      >
        <div class="section-shell products__content">
          <div class="section-heading">
            <i class="ph-fill ph-heart section-heading__heart" aria-hidden="true"></i>
            <h2 id="products-title" class="section-heading__title">Productos</h2>
          </div>

          <div class="products__stage">
            <img
              class="products__mannequin products__mannequin--left"
              src="/maniqui1.png"
              alt="Maniquí lateral con vestido de satén"
              width="804"
              height="1944"
              loading="lazy"
            />

            <div class="products__grid" aria-label="Colección de productos">
              <figure class="product-card">
                <img
                  src="/products/top-rosa.jpg"
                  alt="Top rosa cruzado"
                  width="640"
                  height="794"
                  loading="lazy"
                />
              </figure>
              <figure class="product-card">
                <img
                  src="/products/vestido-verde.jpg"
                  alt="Vestido largo verde"
                  width="683"
                  height="1024"
                  loading="lazy"
                />
              </figure>
              <figure class="product-card">
                <img
                  src="/products/vestido-amarillo.jpg"
                  alt="Vestido amarillo asimétrico"
                  width="1200"
                  height="1200"
                  loading="lazy"
                />
              </figure>
              <figure class="product-card">
                <img
                  src="/products/top-azul.jpg"
                  alt="Top azul satinado"
                  width="736"
                  height="1104"
                  loading="lazy"
                />
              </figure>
              <figure class="product-card">
                <img
                  src="/products/top-crema.jpg"
                  alt="Top crema palabra de honor"
                  width="736"
                  height="736"
                  loading="lazy"
                />
              </figure>
              <figure class="product-card">
                <img
                  src="/products/vestido-lila.jpg"
                  alt="Vestido corto lila"
                  width="571"
                  height="714"
                  loading="lazy"
                />
              </figure>
            </div>

            <img
              class="products__mannequin products__mannequin--right"
              src="/maniqui2.png"
              alt="Maniquí lateral con vestido lila"
              width="807"
              height="1949"
              loading="lazy"
            />
          </div>
        </div>
      </section>

      <section
        id="section-3"
        class="page-section page-section--yellow location"
        aria-labelledby="location-title"
      >
        <div class="section-shell location__content">
          <div class="location__copy-block">
            <div class="section-heading">
              <i class="ph-fill ph-heart section-heading__heart" aria-hidden="true"></i>
              <h2 id="location-title" class="section-heading__title">¿Dónde nos encontramos?</h2>
            </div>
            <p class="location__address">
              Nos encontramos en Hollywood, c/ Hollywood Boulevard, 24
            </p>
          </div>
          <img
            class="location__illustration"
            src="/hollywood-street.png"
            alt="Ilustración de Hollywood Boulevard"
            width="1717"
            height="916"
            loading="lazy"
          />
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <p>© 2026 Modas Candela</p>
    </footer>

    <nav class="floating-nav" aria-label="Navegación por secciones">
      <a class="floating-nav__item" href="#section-1" data-section-id="section-1">Historia</a>
      <a class="floating-nav__item" href="#section-2" data-section-id="section-2">Productos</a>
      <a class="floating-nav__item" href="#section-3" data-section-id="section-3">Ubicación</a>
    </nav>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
